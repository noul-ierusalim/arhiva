name: Archive update (current year)

# Re-extracts the current year from the source site and, if any new/changed
# Markdown is found, pushes it to a branch and prints a link to open the PR
# manually (the org blocks Actions from creating PRs). MP3s and cache/ are
# git-ignored, so only text (out/markdown) can ever land on the branch.

on:
  workflow_dispatch:        # run manually from the Actions tab
  schedule:
    - cron: "0 6 * * 1"     # every Monday 06:00 UTC (messages are weekly)

permissions:
  contents: write           # push the update branch (PR is opened manually)

concurrency:
  group: archive-update
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Look up the current year's archive id (k) from arhiva.html, then
      # extract just that year (text only — audio is git-ignored anyway).
      - name: Extract current year
        id: extract
        run: |
          set -euo pipefail
          YEAR=$(date -u +%Y)
          K=$(PYTHONPATH=scripts python3 -c "import csni_extract as c; print(dict(c.year_map()).get($YEAR, ''))")
          if [ -z "$K" ]; then
            echo "Year $YEAR is not in the archive yet — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Extracting year $YEAR (k=$K)"
          python3 scripts/csni_extract.py --k "$K" --year "$YEAR" --no-audio
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          if [ -n "$(git status --porcelain out/markdown)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new or changed messages."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch with new content
        if: steps.extract.outputs.changed == 'true'
        env:
          YEAR: ${{ steps.extract.outputs.year }}
        run: |
          set -euo pipefail
          BRANCH="archive-update/${YEAR}-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add out/markdown
          git commit -m "Archive update: new content for ${YEAR}"
          git push origin "$BRANCH"
          # Org policy blocks Actions from opening PRs, so surface a one-click
          # link in the run summary for a human to open it.
          URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
          {
            echo "## New content for ${YEAR}"
            echo ""
            echo "Branch \`${BRANCH}\` pushed. Open the PR here:"
            echo ""
            echo "$URL"
          } >> "$GITHUB_STEP_SUMMARY"
